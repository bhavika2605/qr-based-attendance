<!DOCTYPE html>
<html>
<head>
  <title>Teacher QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="text-align:center; font-family:Arial;">
  <h1>👨‍🏫 Teacher QR Generator</h1>
  <input id="lecture" placeholder="Enter Lecture Name">
  <button onclick="generateQR()">Generate QR</button>
  <div id="qrcode"></div>

  <script>
    function generateQR() {
      let lecture = document.getElementById("lecture").value || "Lecture_001";
      let qrDiv = document.getElementById("qrcode");
      qrDiv.innerHTML = "";

      let link = "https://bhavika2605.github.io/qr-based-attendance/student.html?lecture=" + lecture;
      new QRCode(qrDiv, link);
    }
  </script>
</body>
</html>
