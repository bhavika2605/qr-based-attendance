<!DOCTYPE html>
<html>
<head>
  <title>Student Attendance</title>
</head>
<body style="text-align:center; font-family:Arial;">
  <h1>🎓 Attendance Marked</h1>
  <p id="message"></p>

  <script>
  let params = new URLSearchParams(window.location.search);
  let lecture = params.get("lecture") || "Unknown";

  let roll = prompt("Enter your roll number:");
  let time = new Date().toLocaleString();

  fetch("https://script.google.com/macros/s/AKfycbxzA1YfBa0mGb1krldXzrWgjqG7z8jkTyy2RYi-_I4QswVUjvElIBlUk5dDlM7Gpb3m3A/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      lecture: lecture,
      roll: roll,
      time: time
    })
  })
  .then(response => response.text())
  .then(data => {
    document.body.innerHTML = `
      <h1>✅ Attendance Marked Successfully</h1>
      <p><b>Lecture:</b> ${lecture}</p>
      <p><b>Roll No:</b> ${roll}</p>
      <p><b>Time:</b> ${time}</p>
    `;
  })
  .catch(error => {
    document.body.innerHTML = `
      <h1>❌ Error marking attendance</h1>
      <p>Please try again</p>
    `;
  });
</script>
</body>
</html>
