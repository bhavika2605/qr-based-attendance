<!DOCTYPE html>
<html>
<head>
  <title>Student Attendance</title>
</head>
<body style="text-align:center; font-family:Arial;">
  <h1>🎓 Attendance Marked</h1>
  <p id="message"></p>

  <script>
  let params = new URLSearchParams(window.location.search);
  let lecture = params.get("lecture") || "Unknown";

  let roll = prompt("Enter your roll number:");
  let time = new Date().toLocaleString();

  let scriptURL = "https://script.google.com/macros/s/AKfycbxzA1YfBa0mGb1krldXzrWgjqG7z8jkTyy2RYi-_I4QswVUjvElIBlUk5dDlM7Gpb3m3A/exec";

  let finalURL =
    scriptURL +
    "?lecture=" + encodeURIComponent(lecture) +
    "&roll=" + encodeURIComponent(roll) +
    "&time=" + encodeURIComponent(time);

  // Redirect directly to Google Apps Script
  window.location.href = finalURL;
</script>
</body>
</html>
